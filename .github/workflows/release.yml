name: Release

on:
  push:
    tags:
      - '*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.26' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build -v ./...

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --import --batch
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d > private.key

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: ${{ env.GITHUB_TOKEN == '' && 'release --snapshot --skip=publish --clean' || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}

      - name: Checkout gonimals.github.io
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          repository: gonimals/gonimals.github.io
          path: gonimals.github.io
          token: ${{ secrets.GH_PAT }}

      - name: Update RPM repository
        run: |
          mkdir -p gonimals.github.io/rpm/x86_64 gonimals.github.io/rpm/aarch64
          mv dist/*.amd64.rpm gonimals.github.io/rpm/x86_64/
          mv dist/*.arm64.rpm gonimals.github.io/rpm/aarch64/
          
          docker run --rm \
            -v ${{ github.workspace }}/gonimals.github.io/rpm:/rpm \
            almalinux:latest bash -c "dnf install -y createrepo && cd /rpm/x86_64 && createrepo . && cd /rpm/aarch64 && createrepo ."
            
          sudo chown -R $USER:$USER gonimals.github.io/rpm

      - name: Commit and push RPM repository
        run: |
          cd gonimals.github.io
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rpm/
          git commit -m "Update RPM repository for ${{ github.ref_name }}" || echo "No changes to commit"
          git push